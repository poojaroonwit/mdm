apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-pluginhub
  namespace: ba-udp
  labels:
    app: udp-pluginhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-pluginhub
  template:
    metadata:
      labels:
        app: udp-pluginhub
    spec:
      containers:
        - name: udp-pluginhub
          image: nccgit.qsncc.com:5555/ba/unified-data-platform/plugin-hub:1.0.0-beta
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: udp-config
                  key: NODE_ENV
            - name: PORT
              value: '3001'
            - name: PLUGIN_HUB_DIR
              value: '/app/plugins'
            - name: MAIN_APP_URL
              valueFrom:
                configMapKeyRef:
                  name: udp-config
                  key: MAIN_APP_URL
          volumeMounts:
            - name: plugins-storage
              mountPath: /app/plugins

          resources:
            requests:
              memory: '256Mi'
              cpu: '200m'
            limits:
              memory: '512Mi'
              cpu: '500m'

          livenessProbe:
            httpGet:
              path: /api/plugins
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/plugins
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

      volumes:
        - name: plugins-storage
          persistentVolumeClaim:
            claimName: udp-pluginhub-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: udp-pluginhub-pvc
  namespace: ba-udp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-zfspv
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: udp-pluginhub
  namespace: ba-udp
spec:
  selector:
    app: udp-pluginhub
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
