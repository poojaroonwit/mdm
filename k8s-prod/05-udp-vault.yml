apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-vault
  namespace: ba-udp
  labels:
    app: udp-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-vault
  template:
    metadata:
      labels:
        app: udp-vault
    spec:
      containers:
        - name: udp-vault
          image: hashicorp/vault:latest
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: udp-secrets
                  key: VAULT_TOKEN
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: '0.0.0.0:8200'
            - name: VAULT_ADDR
              value: 'http://0.0.0.0:8200'
          command: ['vault', 'server', '-dev', '-dev-listen-address=0.0.0.0:8200']
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
            - name: vault-logs
              mountPath: /vault/logs

          resources:
            requests:
              memory: '256Mi'
              cpu: '200m'
            limits:
              memory: '512Mi'
              cpu: '500m'

          # Vault มี API /v1/sys/health สำหรับเช็คสถานะโดยเฉพาะ
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

      volumes:
        - name: vault-data
          persistentVolumeClaim:
            claimName: udp-vault-data-pvc
        - name: vault-logs
          persistentVolumeClaim:
            claimName: udp-vault-logs-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: udp-vault-data-pvc
  namespace: ba-udp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-zfspv
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: udp-vault-logs-pvc
  namespace: ba-udp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-zfspv
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: udp-vault
  namespace: ba-udp
spec:
  selector:
    app: udp-vault
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
  type: ClusterIP
