apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-redis
  namespace: ba-udp
  labels:
    app: udp-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-redis
  template:
    metadata:
      labels:
        app: udp-redis
    spec:
      containers:
        - name: udp-redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ['redis-server', '--appendonly', 'yes', '--requirepass', '$(REDIS_PASSWORD)']
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: udp-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data

          resources:
            requests:
              memory: '256Mi'
              cpu: '200m'
            limits:
              memory: '512Mi'
              cpu: '500m'

          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: udp-redis-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: udp-redis-pvc
  namespace: ba-udp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-zfspv
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: udp-redis
  namespace: ba-udp
spec:
  selector:
    app: udp-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
