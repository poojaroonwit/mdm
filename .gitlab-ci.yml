variables:
  # Use the project's registry
  VERSION_TAG: $CI_REGISTRY_IMAGE:1.0.6
  IMAGE_TAG: $CI_REGISTRY_IMAGE:1.0.6-$CI_COMMIT_SHORT_SHA
  LATEST_TAG: $CI_REGISTRY_IMAGE:latest
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
  BUILDKIT_PROGRESS: plain

stages:
  - build

docker-build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker pull "${LATEST_TAG}" || true
    - docker buildx inspect --bootstrap
    - docker buildx build --platform linux/amd64 --progress=plain --provenance=false --sbom=false --load --pull --no-cache-filter builder --build-arg BUILD_COMMIT="$CI_COMMIT_SHORT_SHA" --build-arg BUILD_VERSION="1.0.6" --tag "${IMAGE_TAG}" --tag "${VERSION_TAG}" --tag "${LATEST_TAG}" .
    - docker push "${IMAGE_TAG}"
    - docker push "${VERSION_TAG}"
    - docker push "${LATEST_TAG}"
    - docker manifest inspect "${IMAGE_TAG}" >/dev/null
    - docker manifest inspect "${VERSION_TAG}" >/dev/null
    - docker manifest inspect "${LATEST_TAG}" >/dev/null
  only:
    - master
    - main
